<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FocoPrime IA – Textes Inteligentes</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="textes.css" />
  <link rel="icon" href="images/groq.png" type="image/png">
  <!-- Linking Google Fonts For Icons -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@32,400,0,0" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- Ícones e fonts --->
  <link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <!--- Cabeçalho do Header -->
  <div id="header"></div>

<script>
  fetch("../components/header.html")
    .then(res => res.text())
    .then(data => {
      document.getElementById("header").innerHTML = data;
    });
</script>

<div class="container">
  
  <div class="textolir">
    <h1>Moçambique Ia ehhwh</h1>
    <p>Cumprima a minha opinião nesta ehsbhs bbs</p>
  </div>

  <!-- FORMULÁRIO DE TEXTOS -->
  <div class="textes-form">
    <label for="textType">Tipo de texto:</label>
    <select id="textType">
      <option value="redacao">Redação Escolar</option>
      <option value="composicao">Composição</option>
      <option value="resumo">Resumo Académico</option>
      <option value="explicacao">Explicação de Tema</option>
      <option value="carta">Carta / Pedido Formal</option>
    </select>

    <label for="textTheme">Tema do texto:</label>
    <input type="text" id="textTheme" placeholder="Ex: A importância da educação" />

    <label for="textLevel">Nível de ensino:</label>
    <select id="textLevel">
      <option value="primario">Primário</option>
      <option value="secundario">Secundário</option>
      <option value="universitario">Universitário</option>
    </select>

    <label for="textLength">Tamanho do texto:</label>
    <select id="textLength">
      <option value="curto">Curto</option>
      <option value="medio">Médio</option>
      <option value="longo">Longo</option>
    </select>

    <button id="generateTextBtn">✨ Gerar Texto</button>
  </div>

  <!-- RESULTADO -->
  <div class="textes-result">
    <h3>Texto gerado:</h3>
    <div id="generatedText" class="generated-text">
      <p>Aqui aparecerá o texto gerado pela FocoPrime IA.</p>
    </div>
    <button id="copyTextBtn">📋 Copiar Texto</button>
  </div>

</div>

<script src="textes.js"></script>
</body>
  </html>
                                                           </html>
