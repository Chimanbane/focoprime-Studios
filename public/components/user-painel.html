<!-- ===== USER PANEL (LEFT SIDEBAR) ===== -->
<div id="userPanel" class="user-panel">
  <div class="user-panel-header">
    <h3>Conta</h3>
    <button id="closeUserPanel">
      <i class="ri-close-line"></i>
    </button>
  </div>

  <div class="user-panel-body">
    <div class="user-avatar">
      <i class="ri-user-3-fill"></i>
    </div>

    <label>Email</label>
    <input type="email" id="userEmail" disabled>

    <label>Nome do usuário</label>
    <input type="text" id="userName">

    <button id="saveUserName" class="save-btn">
      <i class="ri-save-3-line"></i> Salvar alterações
    </button>
    
    <hr style="margin:20px 0; opacity:0.2;">

<div id="userUsagePanel" class="user-usage-panel">
  <h4><span class="material-symbols-rounded">
    <svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"  
fill="currentColor" viewBox="0 0 24 24" >
<!--Boxicons v3.0.8 https://boxicons.com | License  https://docs.boxicons.com/free-->
<path d="M12 2C6.49 2 2 6.49 2 12s4.49 10 10 10 10-4.49 10-10S17.51 2 12 2m0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8"></path><path d="m16.6 11.39-2.77-1.23-1.23-2.77a.68.68 0 0 0-.6-.4c-.27-.02-.5.15-.61.39l-1.23 2.67-2.78 1.34c-.23.11-.38.35-.38.61s.16.49.4.6l2.77 1.23 1.23 2.77a.663.663 0 0 0 1.22 0l1.23-2.77 2.77-1.23c.24-.11.4-.35.4-.61s-.16-.5-.4-.61Z"></path>
</svg>
  </span>Uso do Modelo</h4>
  <div id="userUsageInfo"></div>
</div>
  </div>

  <div class="user-panel-footer">
    <button id="logoutReal" class="logout-btn danger">
      <i class="ri-logout-box-r-line"></i> Sair da conta
    </button>
  </div>
</div>

<div id="userPanelOverlay" class="user-panel-overlay"></div>
