<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create AI • FocoPrime</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="creatai.css">

</head>
<body>

<div class="main">

<header class="topbar">

<a href="../focoprime.html" class="back-btn">
<i class="ri-arrow-left-line"></i>
</a>

<h3>Create AI</h3>

</header>

<!-- EDITOR -->

<section class="ai-builder">

<div class="builder-card">

  <h2>Create Your AI Assistant</h2>

  <div class="builder-content">

    <!-- LEFT SIDE -->
    <div class="builder-left">

      <label>AI Name</label>
      <input id="aiName" placeholder="Ex: Marketing Assistant">

      <label>Description</label>
      <input id="aiDescription" placeholder="What does this AI do?">

      <label>System Prompt</label>
      <textarea id="aiPrompt" placeholder="You are a helpful AI assistant..."></textarea>

      <label>Model</label>
      <select id="aiModel">
        <option value="llama">Llama 3</option>
        <option value="mixtral">Mixtral</option>
        <option value="gemma">Gemma</option>
      </select>

      <label>Creativity</label>
      <div class="slider-container">
        <input type="range" min="0" max="1" step="0.1" id="aiTemp">
        <span id="tempValue">0.5</span>
      </div>

      <button class="publish-btn" onclick="publishAI()">
        <i class="ri-rocket-line"></i> Publish AI
      </button>

    </div>

    <!-- RIGHT SIDE (Preview / Summary) -->
    <div class="builder-right">
      <div class="ai-preview">
        <h3>AI Preview</h3>
        <p id="previewText">Your AI assistant will appear here as you type the name and description.</p>
      </div>
    </div>

  </div>

</div>

</section>

</div>

<script src="create-ai.js"></script>

</body>
  </html>
